<style>
:root {
  --bg: #0f0f12;
  --card: #1a1a22;
  --card-hover: #22222e;
  --border: #2a2a38;
  --text: #e8e6f0;
  --text-dim: #8b8898;
  --accent: #c2372e;
  --accent-glow: #e04038;
  --correct: #2d9a5a;
  --correct-bg: rgba(45,154,90,0.12);
  --wrong: #c2372e;
  --wrong-bg: rgba(194,55,46,0.12);
  --gold: #d4a843;
  --wien: #c2372e;
  --geschichte: #6b5ce7;
  --demokratie: #2889d4;
  --bundesland: #2a9d6b;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}
.noise {
  position: fixed; inset:0; z-index:0; pointer-events:none; opacity:0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
.app { position:relative; z-index:1; max-width:800px; margin:0 auto; padding:20px; }
h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(1.8rem,4vw,2.6rem);
  text-align:center;
  margin: 30px 0 8px;
  background: linear-gradient(135deg, var(--accent-glow), var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.subtitle { text-align:center; color:var(--text-dim); font-size:0.95rem; margin-bottom:30px; }
.subtitle a { color: var(--gold); text-decoration:none; }

/* Category Cards */
.categories {
  display:grid; gap:16px; margin-bottom:30px;
}
.cat-card {
  background: var(--card);
  border:1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  cursor:pointer;
  transition: all 0.3s;
  display:flex; align-items:center; gap:16px;
}
.cat-card:hover { background:var(--card-hover); transform:translateY(-2px); box-shadow:var(--shadow); }
.cat-card.active { border-color: var(--gold); }
.cat-icon {
  width:48px; height:48px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:1.5rem; flex-shrink:0;
}
.cat-icon.wien { background: rgba(194,55,46,0.15); }
.cat-icon.geschichte { background: rgba(107,92,231,0.15); }
.cat-icon.demokratie { background: rgba(40,137,212,0.15); }
.cat-info h3 { font-size:1.1rem; font-weight:600; }
.cat-info p { font-size:0.85rem; color:var(--text-dim); }
.cat-badge {
  margin-left:auto; padding:4px 12px; border-radius:20px;
  font-size:0.8rem; font-weight:600;
}
.cat-badge.wien { background:rgba(194,55,46,0.15); color:var(--wien); }
.cat-badge.geschichte { background:rgba(107,92,231,0.15); color:var(--geschichte); }
.cat-badge.demokratie { background:rgba(40,137,212,0.15); color:var(--demokratie); }
.cat-badge.bundesland { background:rgba(42,157,107,0.15); color:var(--bundesland); }
.cat-icon.bundesland { background:rgba(42,157,107,0.15); }
.q-category.bundesland { background:rgba(42,157,107,0.12); color:var(--bundesland); }

/* Mode Buttons */
.modes { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; }
.mode-btn {
  flex:1; min-width:140px; padding:12px 16px;
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--radius); color:var(--text);
  font-family:inherit; font-size:0.9rem; font-weight:500;
  cursor:pointer; transition:all 0.2s; text-align:center;
}
.mode-btn:hover { background:var(--card-hover); }
.mode-btn.active { border-color:var(--gold); background:rgba(212,168,67,0.08); color:var(--gold); }

/* Progress */
.progress-bar {
  width:100%; height:6px; background:var(--border);
  border-radius:3px; margin-bottom:20px; overflow:hidden;
}
.progress-fill {
  height:100%; border-radius:3px;
  background: linear-gradient(90deg, var(--accent), var(--gold));
  transition: width 0.5s cubic-bezier(0.22,1,0.36,1);
}
.progress-text {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:10px; font-size:0.85rem; color:var(--text-dim);
}

/* Question Card */
.question-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--radius); padding:28px; margin-bottom:20px;
  animation: fadeIn 0.4s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.q-category {
  font-size:0.75rem; font-weight:600; text-transform:uppercase;
  letter-spacing:1px; margin-bottom:12px; display:inline-block;
  padding:3px 10px; border-radius:6px;
}
.q-category.wien { background:rgba(194,55,46,0.12); color:var(--wien); }
.q-category.geschichte { background:rgba(107,92,231,0.12); color:var(--geschichte); }
.q-category.demokratie { background:rgba(40,137,212,0.12); color:var(--demokratie); }
.q-multi-hint {
  font-size:0.78rem; color:var(--gold); margin-bottom:14px;
  font-style:italic;
}
.q-text {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(1.1rem,2.5vw,1.35rem);
  line-height:1.5; margin-bottom:24px;
}

/* Options */
.options { display:flex; flex-direction:column; gap:10px; }
.option {
  padding:14px 18px; background:rgba(255,255,255,0.03);
  border:1px solid var(--border); border-radius:10px;
  cursor:pointer; transition:all 0.2s; font-size:0.95rem;
  display:flex; align-items:flex-start; gap:12px;
  user-select:none;
}
.option:hover:not(.disabled) { background:rgba(255,255,255,0.06); border-color:#444; }
.option.selected { border-color:var(--gold); background:rgba(212,168,67,0.06); }
.option.correct { border-color:var(--correct); background:var(--correct-bg); }
.option.wrong { border-color:var(--wrong); background:var(--wrong-bg); }
.option.disabled { cursor:default; opacity:0.7; }
.option.correct-missed { border-color:var(--correct); border-style:dashed; background:var(--correct-bg); opacity:0.7; }
.option .check {
  width:22px; height:22px; border-radius:6px; border:2px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; font-size:0.8rem; transition:all 0.2s; margin-top:1px;
}
.option.selected .check { border-color:var(--gold); background:rgba(212,168,67,0.2); }
.option.selected .check::after { content:'✓'; color:var(--gold); }
.option.correct .check { border-color:var(--correct); background:rgba(45,154,90,0.3); }
.option.correct .check::after { content:'✓'; color:#4ade80; }
.option.wrong .check { border-color:var(--wrong); background:rgba(194,55,46,0.3); }
.option.wrong .check::after { content:'✗'; color:#f87171; }
.option.correct-missed .check { border-color:var(--correct); border-style:dashed; }
.option.correct-missed .check::after { content:'✓'; color:var(--correct); opacity:0.6; }

/* Buttons */
.btn-row { display:flex; gap:12px; margin-top:20px; flex-wrap:wrap; }
.btn {
  padding:12px 28px; border-radius:10px; border:none;
  font-family:inherit; font-size:0.95rem; font-weight:600;
  cursor:pointer; transition:all 0.2s;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent-glow));
  color:#fff;
}
.btn-primary:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(194,55,46,0.3); }
.btn-primary:disabled { opacity:0.4; cursor:not-allowed; transform:none; box-shadow:none; }
.btn-secondary {
  background:var(--card); border:1px solid var(--border); color:var(--text);
}
.btn-secondary:hover { background:var(--card-hover); }

/* Results */
.results-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--radius); padding:40px; text-align:center;
  animation: fadeIn 0.5s ease;
}
.score-circle {
  width:140px; height:140px; border-radius:50%; margin:0 auto 24px;
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  position:relative;
}
.score-circle svg { position:absolute; inset:0; }
.score-num { font-family:'DM Serif Display',serif; font-size:2.4rem; z-index:1; }
.score-label { font-size:0.8rem; color:var(--text-dim); z-index:1; }
.results-title {
  font-family:'DM Serif Display',serif; font-size:1.6rem; margin-bottom:8px;
}
.results-sub { color:var(--text-dim); margin-bottom:24px; }
.stats-row { display:flex; justify-content:center; gap:32px; margin-bottom:28px; flex-wrap:wrap; }
.stat { text-align:center; }
.stat-num { font-size:1.6rem; font-weight:700; }
.stat-num.green { color:var(--correct); }
.stat-num.red { color:var(--wrong); }
.stat-label { font-size:0.8rem; color:var(--text-dim); }

/* Review Section */
.review-item {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--radius); padding:20px; margin-bottom:12px;
  text-align:left;
}
.review-q { font-weight:600; margin-bottom:10px; font-size:0.95rem; }
.review-answer { font-size:0.88rem; padding:4px 0; }
.review-answer.correct-ans { color:var(--correct); }
.review-answer.wrong-ans { color:var(--wrong); text-decoration:line-through; }
.review-answer.missed-ans { color:var(--gold); font-style:italic; }

/* Footer */
.site-footer {
  margin-top: 60px;
  padding: 32px 20px 40px;
  border-top: 1px solid var(--border);
  text-align: center;
}
.kaiserschmarrn-card {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  background: var(--card);
  border: 1px solid rgba(212,168,67,0.25);
  border-radius: var(--radius);
  padding: 24px 32px;
  max-width: 380px;
  width: 100%;
}
.kaiserschmarrn-emoji {
  font-size: 2.8rem;
  line-height: 1;
}
.kaiserschmarrn-title {
  font-family: 'DM Serif Display', serif;
  font-size: 1.25rem;
  background: linear-gradient(135deg, var(--gold), #f0c060);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.kaiserschmarrn-sub {
  font-size: 0.82rem;
  color: var(--text-dim);
  line-height: 1.5;
}
.footer-links {
  display: flex;
  gap: 12px;
  margin-top: 4px;
  flex-wrap: wrap;
  justify-content: center;
}
.footer-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  border-radius: 8px;
  font-size: 0.88rem;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.2s;
  font-family: inherit;
}
.footer-link.paypal {
  background: rgba(0,112,240,0.12);
  border: 1px solid rgba(0,112,240,0.3);
  color: #4a9eff;
}
.footer-link.paypal:hover { background: rgba(0,112,240,0.2); transform: translateY(-1px); }
.footer-link.linkedin {
  background: rgba(10,102,194,0.12);
  border: 1px solid rgba(10,102,194,0.3);
  color: #5ba4f5;
}
.footer-link.linkedin:hover { background: rgba(10,102,194,0.2); transform: translateY(-1px); }
.footer-credits {
  margin-top: 20px;
  font-size: 0.78rem;
  color: var(--text-dim);
}

/* Responsive */
@media(max-width:600px) {
  .app { padding:12px; }
  .question-card { padding:20px; }
  .results-card { padding:24px; }
  .stats-row { gap:20px; }
}

/* Exam banner */
.exam-banner {
  background: linear-gradient(135deg, rgba(194,55,46,0.12), rgba(212,168,67,0.08));
  border: 1px solid rgba(212,168,67,0.3);
  border-radius: var(--radius);
  padding: 20px 24px;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}
.exam-banner:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--gold); }
.exam-banner-icon { font-size: 2rem; }
.exam-banner-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 2px; }
.exam-banner-sub { font-size: 0.82rem; color: var(--text-dim); }
.exam-banner-arrow { margin-left: auto; color: var(--gold); font-size: 1.2rem; flex-shrink: 0; }

/* Wrong bank card */
.wrong-bank-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px;
  cursor: pointer; margin-top: 16px; transition: all 0.2s;
}
.wrong-bank-card:hover { background: var(--card-hover); }

/* Topic score bars */
.topic-scores-section { margin: 16px 0 20px; }
.topic-score-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.topic-score-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.topic-score-bar { height: 100%; border-radius: 3px; transition: width 0.8s ease; }

/* History */
.hist-item {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px;
  margin-bottom: 10px; cursor: pointer; transition: all 0.2s;
}
.hist-item:hover { background: var(--card-hover); }
.hist-badge { padding: 3px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; }
.hist-badge.pass { background: rgba(45,154,90,0.15); color: var(--correct); }
.hist-badge.fail { background: rgba(194,55,46,0.15); color: var(--wrong); }

/* Answer status feedback */
.answer-status {
  margin-top: 14px; padding: 8px 14px; border-radius: 8px;
  font-size: 0.88rem; font-weight: 500;
}
.correct-status { background: var(--correct-bg); color: #4ade80; border: 1px solid var(--correct); }
.partial-status { background: rgba(212,168,67,0.1); color: var(--gold); border: 1px solid rgba(212,168,67,0.4); }
.wrong-status { background: var(--wrong-bg); color: #f87171; border: 1px solid var(--wrong); }
</style>
</head>

// LOCAL STORAGE
// ============================================================
function loadHistory() {
  try { return JSON.parse(localStorage.getItem('quizHistory') || '[]'); } catch(e) { return []; }
}
function saveHistory(entry) {
  const h = loadHistory();
  h.unshift(entry);
  if(h.length > 50) h.length = 50;
  localStorage.setItem('quizHistory', JSON.stringify(h));
}
function loadWrongBank() {
  try { return JSON.parse(localStorage.getItem('wrongBank') || '[]'); } catch(e) { return []; }
}
function saveWrongBank(bank) {
  localStorage.setItem('wrongBank', JSON.stringify(bank));
}
function updateWrongBank(questions, answers) {
  const bank = loadWrongBank();
  answers.forEach(a => {
    const q = questions[a.qIdx];
    if(!q) return;
    const idx = bank.findIndex(b => b.q === q.q);
    if(a.status === 'correct') {
      if(idx > -1) bank.splice(idx, 1);
    } else {
      if(idx > -1) { bank[idx].wrongCount++; bank[idx].lastWrong = new Date().toISOString(); }
      else bank.push({ cat:q.cat, q:q.q, opts:q.opts, ans:q.ans, wrongCount:1, lastWrong:new Date().toISOString() });
    }
  });
  saveWrongBank(bank);
}

// ============================================================
// SCORING
// ============================================================
// Returns { status: 'correct'|'partial'|'wrong', points: 0|1 }
// Partial = multi-answer question, some correct answers selected, NO wrong answers selected
// Per exam rules: partial counts as 1 point ("teilweise richtig gewertet, sofern keine falsche Auswahlmöglichkeit")
function evaluateAnswer(q, selected) {
  if(selected.length === 0) return { status:'wrong', points:0 };
  const hasWrong = selected.some(s => !q.ans.includes(s));
  if(hasWrong) return { status:'wrong', points:0 };
  const allCorrect = q.ans.every(a => selected.includes(a));
  if(allCorrect) return { status:'correct', points:1 };
  if(q.ans.length > 1) return { status:'partial', points:1 }; // partial credit
  return { status:'wrong', points:0 };
}

// Exam pass rules:
// Pass if totalScore >= 12 OR (>= 50% in EACH topic = >= 3/6 per topic)
function calculateExamResult(answers, questions, bundesland) {
  const cats = ['Geschichte', 'Demokratie', bundesland];
  const topicScores = {};
  let totalScore = 0;
  cats.forEach(cat => {
    const pts = answers
      .filter(a => questions[a.qIdx] && questions[a.qIdx].cat === cat)
      .reduce((s,a) => s + a.points, 0);
    topicScores[cat] = { score:pts, total:6, pct:pts/6 };
    totalScore += pts;
  });
  const passBy12 = totalScore >= 12;
  const passBy50pct = cats.every(cat => topicScores[cat].pct >= 0.5);
  return { totalScore, topicScores, passed: passBy12 || passBy50pct, passBy12, passBy50pct, cats };
}

let state = {
  screen: 'home', // home, quiz, results, history, historyDetail
  selectedCats: [],
  mode: 'all', // all, shuffle, exam, review
  examBundesland: 'Wien', // which Bundesland topic to use in exam mode
  questions: [],
  currentQ: 0,
  selected: [],
  answered: false,
  score: 0,
  answers: [], // {qIdx, selected, status, points}
  examResult: null,
  historyItem: null,
};

function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function startQuiz() {
  let qs;
  if(state.mode === 'exam') {
    // 6 random from Geschichte + Demokratie + chosen Bundesland, then shuffle all 18
    const cats = ['Geschichte', 'Demokratie', state.examBundesland];
    qs = shuffle(cats.flatMap(cat =>
      shuffle(ALL_QUESTIONS.filter(q => q.cat === cat)).slice(0, 6)
    ));
  } else if(state.mode === 'review') {
    qs = shuffle(loadWrongBank());
    if(qs.length === 0) { alert('Noch keine falsch beantworteten Fragen gespeichert!'); return; }
  } else {
    qs = ALL_QUESTIONS.filter(q => state.selectedCats.includes(q.cat));
    if(state.mode === 'shuffle') qs = shuffle(qs);
  }
  state.questions = qs;
  state.currentQ = 0; state.selected = []; state.answered = false;
  state.score = 0; state.answers = []; state.examResult = null;
  state.screen = 'quiz';
  render();
}

function startExam() { state.mode = 'exam'; startQuiz(); }
function setExamBundesland(bl) { state.examBundesland = bl; render(); }

function startReview() {
  const bank = loadWrongBank();
  if(bank.length === 0) { alert('Noch keine falsch beantworteten Fragen gespeichert!'); return; }
  state.mode = 'review'; startQuiz();
}

function toggleOption(idx) {
  if(state.answered) return;
  const i = state.selected.indexOf(idx);
  if(i>-1) state.selected.splice(i,1); else state.selected.push(idx);
  render();
}

function checkAnswer() {
  const q = state.questions[state.currentQ];
  const result = evaluateAnswer(q, state.selected);
  state.score += result.points;
  state.answers.push({ qIdx:state.currentQ, selected:[...state.selected], status:result.status, points:result.points });
  state.answered = true;
  render();
}

function nextQuestion() {
  state.currentQ++;
  state.selected = []; state.answered = false;
  if(state.currentQ >= state.questions.length) {
    if(state.mode === 'exam') state.examResult = calculateExamResult(state.answers, state.questions, state.examBundesland);
    saveHistory({
      id: Date.now(),
      date: new Date().toISOString(),
      mode: state.mode,
      cats: state.mode === 'exam' ? ['Wien','Geschichte','Demokratie'] : [...state.selectedCats],
      total: state.questions.length,
      score: state.score,
      examResult: state.examResult,
      questions: state.questions.map(q => ({ cat:q.cat, q:q.q, opts:q.opts, ans:q.ans })),
      answers: state.answers,
    });
    updateWrongBank(state.questions, state.answers);
    state.screen = 'results';
  }
  render();
}

function goHome() { state.screen = 'home'; render(); }
function showHistory() { state.screen = 'history'; render(); }
function showHistoryDetail(id) {
  state.historyItem = loadHistory().find(h => h.id === id) || null;
  state.screen = 'historyDetail';
  render();
}
function clearHistory() { localStorage.removeItem('quizHistory'); }
function clearWrongBank() { localStorage.removeItem('wrongBank'); render(); }

function getCatClass(cat) {
  if(cat==='Wien') return 'wien';
  if(cat==='Geschichte') return 'geschichte';
  if(cat==='Demokratie') return 'demokratie';
  return 'bundesland';
}

}

function renderQuiz() {
  const q = state.questions[state.currentQ];
  const catClass = getCatClass(q.cat);
  const isMulti = q.ans.length > 1;
  const pct = (state.currentQ / state.questions.length * 100);

  let optsHTML = q.opts.map((opt,i) => {
    let cls = 'option';
    if(state.answered) {
      cls += ' disabled';
      if(state.selected.includes(i) && q.ans.includes(i)) cls += ' correct';
      else if(state.selected.includes(i) && !q.ans.includes(i)) cls += ' wrong';
      else if(!state.selected.includes(i) && q.ans.includes(i)) cls += ' correct-missed';
    } else {
      if(state.selected.includes(i)) cls += ' selected';
    }
    return `<div class="${cls}" onclick="toggleOption(${i})">
      <span class="check"></span>
      <span>${opt}</span>
    </div>`;
  }).join('');

  let statusBadge = '';
  if(state.answered) {
    const ev = evaluateAnswer(q, state.selected);
    if(ev.status === 'correct') statusBadge = `<div class="answer-status correct-status">✓ Richtig – 1 Punkt</div>`;
    else if(ev.status === 'partial') statusBadge = `<div class="answer-status partial-status">◐ Teilweise richtig – 1 Punkt (keine falsche Auswahl getroffen)</div>`;
    else statusBadge = `<div class="answer-status wrong-status">✗ Falsch – 0 Punkte</div>`;
  }

  const modeTag = state.mode === 'exam'
    ? ` <span style="color:var(--gold);font-weight:600;">🎓 Prüfung</span>`
    : state.mode === 'review'
    ? ` <span style="color:var(--gold);font-weight:600;">📚 Wiederholung</span>`
    : '';

  return `
    <div class="progress-text">
      <span>Frage ${state.currentQ+1} von ${state.questions.length}${modeTag}</span>
      <span>${state.score} Punkte</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>

    <div class="question-card">
      <span class="q-category ${catClass}">${q.cat}</span>
      ${isMulti ? '<div class="q-multi-hint">⚠ Mehrere Antworten möglich!</div>' : ''}
      <div class="q-text">${q.q}</div>
      <div class="options">${optsHTML}</div>
      ${statusBadge}
    </div>

    <div class="btn-row">
      ${!state.answered
        ? `<button class="btn btn-primary" ${state.selected.length===0?'disabled':''} onclick="checkAnswer()">Prüfen</button>`
        : `<button class="btn btn-primary" onclick="nextQuestion()">${state.currentQ < state.questions.length-1 ? 'Nächste Frage →' : 'Ergebnis anzeigen'}</button>`}
      <button class="btn btn-secondary" onclick="goHome()">← Zurück</button>
    </div>
  `;
}

function renderResults() {
  const total = state.questions.length;
  const wrongCount = state.answers.filter(a => a.status === 'wrong').length;
  const partialCount = state.answers.filter(a => a.status === 'partial').length;
  const correctCount = state.answers.filter(a => a.status === 'correct').length;

  let mainHTML = '';

  if(state.mode === 'exam' && state.examResult) {
    const r = state.examResult;
    const color = r.passed ? 'var(--correct)' : 'var(--wrong)';
    const circumference = 2 * Math.PI * 58;
    const offset = circumference - (r.totalScore / 18) * circumference;

    const topicRows = (r.cats || ['Geschichte','Demokratie', state.examBundesland]).map(cat => {
      const ts = r.topicScores[cat];
      if(!ts) return '';
      const catPassed = ts.pct >= 0.5;
      return `<div class="topic-score-row">
        <span class="q-category ${getCatClass(cat)}" style="font-size:0.7rem;min-width:82px;">${cat}</span>
        <div class="topic-score-bar-wrap">
          <div class="topic-score-bar" style="width:${ts.pct*100}%;background:${catPassed?'var(--correct)':'var(--wrong)'}"></div>
        </div>
        <span style="color:${catPassed?'var(--correct)':'var(--wrong)'};font-weight:600;min-width:46px;text-align:right;">${ts.score}/6 ${catPassed?'✓':'✗'}</span>
      </div>`;
    }).join('');

    mainHTML = `<div class="results-card">
      <div class="score-circle">
        <svg viewBox="0 0 130 130">
          <circle cx="65" cy="65" r="58" fill="none" stroke="var(--border)" stroke-width="6"/>
          <circle cx="65" cy="65" r="58" fill="none" stroke="${color}" stroke-width="6"
            stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"
            stroke-linecap="round" transform="rotate(-90 65 65)" style="transition:stroke-dashoffset 1s ease"/>
        </svg>
        <span class="score-num" style="color:${color}">${r.totalScore}/18</span>
        <span class="score-label">Punkte</span>
      </div>
      <div class="results-title" style="color:${color}">${r.passed ? '🎉 Bestanden!' : '✗ Nicht bestanden'}</div>
      <p class="results-sub">${r.passed
        ? (r.passBy12 ? 'Du hast ≥ 12 Punkte erreicht.' : 'Du hast ≥ 50 % in jedem Teilgebiet erreicht.')
        : 'Notwendig: ≥ 12 Punkte gesamt ODER ≥ 3/6 (50 %) in jedem Teilgebiet.'}</p>
      <div class="topic-scores-section">${topicRows}</div>
      <div class="stats-row">
        <div class="stat"><div class="stat-num green">${correctCount}</div><div class="stat-label">Richtig</div></div>
        <div class="stat"><div class="stat-num" style="color:var(--gold)">${partialCount}</div><div class="stat-label">Teilweise</div></div>
        <div class="stat"><div class="stat-num red">${wrongCount}</div><div class="stat-label">Falsch</div></div>
      </div>
      <div class="btn-row" style="justify-content:center">
        <button class="btn btn-primary" onclick="startExam()">🔄 Neue Prüfung</button>
        <button class="btn btn-secondary" onclick="goHome()">← Startseite</button>
      </div>
    </div>`;
  } else {
    const pct = Math.round(state.score / total * 100);
    const passed = pct >= 50;
    const circumference = 2 * Math.PI * 58;
    const offset = circumference - (pct / 100) * circumference;
    const color = passed ? 'var(--correct)' : 'var(--wrong)';
    const grade = pct >= 90 ? 'Ausgezeichnet! 🎉' : pct >= 75 ? 'Sehr gut! 👏' : pct >= 50 ? 'Bestanden! ✓' : 'Weiter üben! 📚';

    mainHTML = `<div class="results-card">
      <div class="score-circle">
        <svg viewBox="0 0 130 130">
          <circle cx="65" cy="65" r="58" fill="none" stroke="var(--border)" stroke-width="6"/>
          <circle cx="65" cy="65" r="58" fill="none" stroke="${color}" stroke-width="6"
            stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"
            stroke-linecap="round" transform="rotate(-90 65 65)" style="transition:stroke-dashoffset 1s ease"/>
        </svg>
        <span class="score-num" style="color:${color}">${pct}%</span>
        <span class="score-label">${state.score}/${total}</span>
      </div>
      <div class="results-title">${grade}</div>
      <p class="results-sub">${passed ? 'Du hast den Übungstest gut abgeschlossen!' : 'Du brauchst mindestens 50 % zum Bestehen.'}</p>
      <div class="stats-row">
        <div class="stat"><div class="stat-num green">${correctCount}</div><div class="stat-label">Richtig</div></div>
        <div class="stat"><div class="stat-num" style="color:var(--gold)">${partialCount}</div><div class="stat-label">Teilweise</div></div>
        <div class="stat"><div class="stat-num red">${wrongCount}</div><div class="stat-label">Falsch</div></div>
        <div class="stat"><div class="stat-num">${total}</div><div class="stat-label">Gesamt</div></div>
      </div>
      <div class="btn-row" style="justify-content:center">
        <button class="btn btn-primary" onclick="startQuiz()">🔄 Nochmal</button>
        <button class="btn btn-secondary" onclick="goHome()">← Startseite</button>
      </div>
    </div>`;
  }

  // Review section for wrong/partial answers
  const reviewItems = state.answers.filter(a => a.status !== 'correct').map(a => {
    const q = state.questions[a.qIdx];
    const correctOpts = q.ans.map(i => `<div class="review-answer correct-ans">✓ ${q.opts[i]}</div>`).join('');
    const wrongOpts = a.selected.filter(s => !q.ans.includes(s)).map(s => `<div class="review-answer wrong-ans">✗ ${q.opts[s]}</div>`).join('');
    const missedOpts = q.ans.filter(i => !a.selected.includes(i)).map(i => `<div class="review-answer missed-ans">↳ vergessen: ${q.opts[i]}</div>`).join('');
    const statusTag = a.status === 'partial' ? '<span style="color:var(--gold);font-size:0.75rem;font-weight:500;"> – teilweise richtig</span>' : '';
    return `<div class="review-item">
      <div class="review-q"><span class="q-category ${getCatClass(q.cat)}" style="margin-right:8px;font-size:0.7rem;">${q.cat}</span>${q.q}${statusTag}</div>
      ${correctOpts}${wrongOpts}${missedOpts}
    </div>`;
  }).join('');

  return mainHTML + (reviewItems
    ? `<h3 style="font-family:'DM Serif Display',serif;margin:24px 0 14px;font-size:1.2rem;">Zum Nachlernen:</h3>${reviewItems}`
    : '');
}

function renderHistory() {
  const history = loadHistory();
  if(history.length === 0) return `
    <h1 style="font-size:1.8rem;margin-bottom:20px;">Testergebnisse</h1>
    <div class="results-card" style="text-align:center;">
      <p style="color:var(--text-dim);margin-bottom:20px;">Noch keine Tests absolviert.</p>
      <button class="btn btn-secondary" onclick="goHome()">← Zurück</button>
    </div>`;

  const modeLabels = { exam:'🎓 Prüfungssimulation', all:'📋 Übungstest', shuffle:'🔀 Zufälliger Test', review:'📚 Wiederholung' };

  const items = history.map(h => {
    const d = new Date(h.date);
    const ds = d.toLocaleDateString('de-AT',{day:'2-digit',month:'2-digit',year:'numeric'})
             + ' · ' + d.toLocaleTimeString('de-AT',{hour:'2-digit',minute:'2-digit'});
    const label = modeLabels[h.mode] || h.mode;
    let badgeHTML = '';
    if(h.mode === 'exam' && h.examResult) {
      badgeHTML = `<span class="hist-badge ${h.examResult.passed?'pass':'fail'}">${h.examResult.passed?'Bestanden':'Nicht bestanden'}</span>`;
    } else {
      const pct = Math.round(h.score / h.total * 100);
      badgeHTML = `<span style="color:var(--text-dim);font-size:0.85rem;">${h.score}/${h.total} · ${pct}%</span>`;
    }
    return `<div class="hist-item" onclick="showHistoryDetail(${h.id})">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <div style="flex:1;min-width:0;">
          <div style="font-weight:600;margin-bottom:2px;">${label}</div>
          <div style="font-size:0.82rem;color:var(--text-dim);">${ds} · ${h.total} Fragen</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">${badgeHTML}<span style="color:var(--text-dim);">›</span></div>
      </div>
    </div>`;
  }).join('');

  return `
    <h1 style="font-size:1.8rem;margin-bottom:8px;">Testergebnisse</h1>
    <p style="color:var(--text-dim);font-size:0.85rem;margin-bottom:20px;">${history.length} gespeicherte Tests</p>
    ${items}
    <div class="btn-row" style="justify-content:center;margin-top:20px;">
      <button class="btn btn-secondary" onclick="goHome()">← Zurück</button>
      <button class="btn btn-secondary" style="border-color:var(--wrong);color:var(--wrong);"
        onclick="if(confirm('Alle Ergebnisse löschen?')){clearHistory();goHome();}">🗑 Verlauf löschen</button>
    </div>`;
}

function renderHistoryDetail() {
  const h = state.historyItem;
  if(!h) return renderHistory();

  const d = new Date(h.date);
  const ds = d.toLocaleDateString('de-AT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const modeLabels = { exam:'🎓 Prüfungssimulation', all:'📋 Übungstest', shuffle:'🔀 Zufälliger Test', review:'📚 Wiederholung' };

  let summaryHTML = '';
  if(h.mode === 'exam' && h.examResult) {
    const r = h.examResult;
    const color = r.passed ? 'var(--correct)' : 'var(--wrong)';
    const topicKeys = r.cats || Object.keys(r.topicScores || {});
    const topicRows = topicKeys.map(cat => {
      const ts = r.topicScores && r.topicScores[cat];
      if(!ts) return '';
      const catPassed = ts.pct >= 0.5;
      return `<div class="topic-score-row">
        <span class="q-category ${getCatClass(cat)}" style="font-size:0.7rem;min-width:82px;">${cat}</span>
        <div class="topic-score-bar-wrap">
          <div class="topic-score-bar" style="width:${ts.pct*100}%;background:${catPassed?'var(--correct)':'var(--wrong)'}"></div>
        </div>
        <span style="color:${catPassed?'var(--correct)':'var(--wrong)'};font-weight:600;">${ts.score}/6 ${catPassed?'✓':'✗'}</span>
      </div>`;
    }).join('');
    summaryHTML = `<div style="text-align:center;margin-bottom:12px;">
      <div style="font-size:2rem;font-weight:700;color:${color};margin-bottom:4px;">${r.totalScore}/18 Punkte</div>
      <div style="color:${color};font-weight:600;font-size:1.1rem;">${r.passed?'✓ Bestanden':'✗ Nicht bestanden'}</div>
    </div>
    <div class="topic-scores-section">${topicRows}</div>`;
  } else {
    const pct = Math.round(h.score / h.total * 100);
    summaryHTML = `<div style="text-align:center;">
      <div style="font-size:2rem;font-weight:700;margin-bottom:4px;">${h.score}/${h.total}</div>
      <div style="color:var(--text-dim);">${pct}%</div>
    </div>`;
  }

  const reviewItems = (h.answers || []).map(a => {
    const q = h.questions && h.questions[a.qIdx];
    if(!q) return '';
    const correctOpts = q.ans.map(i => `<div class="review-answer correct-ans">✓ ${q.opts[i]}</div>`).join('');
    const wrongOpts = (a.selected||[]).filter(s => !q.ans.includes(s)).map(s => `<div class="review-answer wrong-ans">✗ ${q.opts[s]}</div>`).join('');
    const missedOpts = q.ans.filter(i => !(a.selected||[]).includes(i)).map(i => `<div class="review-answer missed-ans">↳ vergessen: ${q.opts[i]}</div>`).join('');
    const borderColor = a.status==='correct'?'var(--correct)':a.status==='partial'?'var(--gold)':'var(--wrong)';
    const statusIcon = a.status==='correct'?'✓':a.status==='partial'?'◐':'✗';
    const statusColor = a.status==='correct'?'#4ade80':a.status==='partial'?'var(--gold)':'#f87171';
    return `<div class="review-item" style="border-left:3px solid ${borderColor};padding-left:14px;">
      <div class="review-q">
        <span style="color:${statusColor};margin-right:6px;font-weight:700;">${statusIcon}</span>
        <span class="q-category ${getCatClass(q.cat)}" style="margin-right:8px;font-size:0.7rem;">${q.cat}</span>${q.q}
      </div>
      ${correctOpts}${wrongOpts}${missedOpts}
    </div>`;
  }).join('');

  return `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
      <button class="btn btn-secondary" onclick="showHistory()" style="padding:8px 16px;">← Zurück</button>
      <div>
        <div style="font-weight:600;">${modeLabels[h.mode]||h.mode}</div>
        <div style="font-size:0.82rem;color:var(--text-dim);">${ds}</div>
      </div>
    </div>
    <div class="results-card" style="margin-bottom:20px;">${summaryHTML}</div>
    <h3 style="font-family:'DM Serif Display',serif;margin:0 0 14px;font-size:1.2rem;">Alle Antworten (${(h.answers||[]).length}):</h3>
    ${reviewItems}
  `;
}

// ============================================================
// EVENT HANDLERS
// ============================================================
function toggleCat(cat) {
  if(state.mode === 'exam' || state.mode === 'review') state.mode = 'all';
  const i = state.selectedCats.indexOf(cat);
  if(i>-1) state.selectedCats.splice(i,1); else state.selectedCats.push(cat);
  render();
}
function setMode(m) { state.mode = m; render(); }

// INIT
render();
</script>
